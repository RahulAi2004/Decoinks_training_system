services:
  app:
    build: .
    container_name: decoinks-training-system
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
      # Persist every admin upload (knowledge, training, Q&A, and company products)
      # across container rebuilds.
      - ./content:/app/content
